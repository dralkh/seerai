<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:link rel="stylesheet" href="preferences.css" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label>
    <html:h2 data-l10n-id="pref-title"></html:h2>
  </label>

  <!-- AI Model Configurations -->
  <label>
    <html:h3 data-l10n-id="pref-models-title">AI Model Configurations</html:h3>
  </label>
  <hbox align="center" style="margin-bottom: 8px">
    <button
      id="zotero-prefpane-__addonRef__-models-add"
      data-l10n-id="pref-models-add"
    />
    <button
      id="zotero-prefpane-__addonRef__-models-edit"
      data-l10n-id="pref-models-edit"
      disabled="true"
    />
    <button
      id="zotero-prefpane-__addonRef__-models-delete"
      data-l10n-id="pref-models-delete"
      disabled="true"
    />
    <button
      id="zotero-prefpane-__addonRef__-models-default"
      data-l10n-id="pref-models-set-default"
      disabled="true"
    />
  </hbox>
  <html:div id="__addonRef__-models-list">
    <html:p
      id="__addonRef__-models-empty"
      data-l10n-id="pref-models-empty"
    ></html:p>
  </html:div>

  <html:hr style="margin: 16px 0" />

  <!-- MCP Server Integration -->
  <label>
    <html:h3>MCP Server Integration (Claude Desktop)</html:h3>
  </label>
  <vbox
    style="
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    "
  >
    <hbox align="center" style="margin-bottom: 8px; gap: 16px">
      <button
        label="GitHub Repo"
        oncommand="Zotero.launchURL('https://github.com/dralkh/seerai')"
      />
      <button
        label="Download Release"
        oncommand="
          Zotero.launchURL('https://github.com/dralkh/seerai/releases')
        "
      />
    </hbox>

    <description style="margin-bottom: 4px; font-weight: bold"
      >Configuration (mcp_config.json):</description
    >
    <hbox style="margin-bottom: 4px">
      <html:textarea
        id="zotero-prefpane-__addonRef__-mcpConfigJson"
        readonly="true"
        style="
          width: 100%;
          height: 120px;
          font-family: monospace;
          font-size: 11px;
          padding: 8px;
          border: 1px solid #ccc;
          border-radius: 4px;
          resize: vertical;
        "
      />
    </hbox>

    <hbox pack="end">
      <button
        id="zotero-prefpane-__addonRef__-copyMcpConfig"
        label="Copy Config to Clipboard"
      />
    </hbox>
  </vbox>

  <html:hr style="margin: 16px 0" />

  <!-- Advanced Data Management -->
  <label>
    <html:h3>Advanced Data Management</html:h3>
  </label>
  <description style="margin-bottom: 8px; font-size: 11px; color: #666">
    Export or import your entire Seer-AI configuration, including models,
    prompts, tables, and API keys.
  </description>
  <hbox align="center" style="gap: 12px; margin-bottom: 12px">
    <button
      id="zotero-prefpane-__addonRef__-exportConfig"
      label="Export Configuration"
    />
    <button
      id="zotero-prefpane-__addonRef__-importConfig"
      label="Import Configuration"
    />
  </hbox>

  <html:hr style="margin: 16px 0" />

  <!-- OCR Configurations -->
  <label>
    <html:h3 data-l10n-id="pref-datalab-title">OCR Configurations</html:h3>
  </label>

  <!-- Service Selection with Menulist Dropdown -->
  <hbox align="center" style="margin-bottom: 12px">
    <label style="width: 120px; font-weight: bold">OCR Service:</label>
    <menulist
      id="zotero-prefpane-__addonRef__-datalabMode"
      style="min-width: 200px"
    >
      <menupopup>
        <menuitem value="local" label="Local Marker Server" />
        <menuitem value="cloud" label="Cloud (DataLab.to)" />
        <menuitem value="mistral" label="Mistral OCR" />
      </menupopup>
    </menulist>
  </hbox>

  <!-- Local Server Settings -->
  <vbox
    id="zotero-prefpane-__addonRef__-localSettings"
    style="
      margin-left: 20px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    "
  >
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">Server URL:</label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-datalabUrl"
        placeholder="http://localhost:8001"
        style="flex: 1; min-width: 200px"
      ></html:input>
    </hbox>
    <hbox align="center" style="margin-bottom: 8px">
      <checkbox
        id="zotero-prefpane-__addonRef__-localForceOcr"
        label="Force OCR"
        checked="true"
      />
    </hbox>
    <hbox align="center">
      <html:a
        href="https://github.com/dralkh/seerai#option-b-local-marker-server"
        style="
          color: #0066cc;
          text-decoration: underline;
          cursor: pointer;
          font-size: 12px;
        "
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
      >
        📖 Setup Tutorial
      </html:a>
    </hbox>
  </vbox>

  <!-- Cloud DataLab Settings -->
  <vbox
    id="zotero-prefpane-__addonRef__-cloudSettings"
    style="
      margin-left: 20px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    "
  >
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">API Key:</label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-datalabApiKey"
        placeholder="Token from datalab.to"
        style="flex: 1; min-width: 200px"
      ></html:input>
    </hbox>
    <hbox align="center" style="margin-bottom: 6px">
      <checkbox
        id="zotero-prefpane-__addonRef__-cloudForceOcr"
        label="Force OCR"
      />
    </hbox>
    <hbox align="center">
      <checkbox
        id="zotero-prefpane-__addonRef__-cloudUseLlm"
        label="Use LLM (AI-enhanced extraction)"
      />
    </hbox>
  </vbox>

  <!-- Mistral OCR Settings -->
  <vbox
    id="zotero-prefpane-__addonRef__-mistralSettings"
    style="
      margin-left: 20px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    "
  >
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">API Key:</label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-mistralApiKey"
        placeholder="Mistral API Key"
        style="flex: 1; min-width: 200px"
      ></html:input>
    </hbox>
    <hbox align="center">
      <html:a
        href="https://docs.mistral.ai/capabilities/document/"
        style="
          color: #0066cc;
          text-decoration: underline;
          cursor: pointer;
          font-size: 12px;
        "
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
      >
        📖 Mistral OCR Docs
      </html:a>
    </hbox>
  </vbox>

  <html:hr style="margin: 16px 0" />

  <!-- Semantic Scholar Settings -->
  <label>
    <html:h3>Semantic Scholar Integration</html:h3>
  </label>
  <vbox
    style="
      margin-left: 20px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    "
  >
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">API Key:</label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-semanticScholarApiKey"
        placeholder="S2 API Key"
        style="flex: 1; min-width: 200px"
      ></html:input>
    </hbox>
    <hbox align="center">
      <html:a
        href="https://www.semanticscholar.org/product/api#api-key"
        style="
          color: #0066cc;
          text-decoration: underline;
          cursor: pointer;
          font-size: 12px;
        "
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
      >
        📖 Get API Key
      </html:a>
    </hbox>
  </vbox>

  <html:hr style="margin: 16px 0" />

  <!-- Web Search Integration -->
  <label>
    <html:h3>Web Search Integration (PDF Discovery &amp; AI Context)</html:h3>
  </label>

  <!-- Provider Selection -->
  <hbox align="center" style="margin-bottom: 12px">
    <label style="width: 120px; font-weight: bold">Search Provider:</label>
    <menulist
      id="zotero-prefpane-__addonRef__-webSearchProvider"
      style="min-width: 150px"
    >
      <menupopup>
        <menuitem value="firecrawl" label="Firecrawl" />
        <menuitem value="tavily" label="Tavily" />
      </menupopup>
    </menulist>
  </hbox>

  <!-- Firecrawl Settings -->
  <vbox
    id="zotero-prefpane-__addonRef__-firecrawlSettings"
    style="
      margin-left: 20px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    "
  >
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">API Key:</label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-firecrawlApiKey"
        placeholder="fc-YOUR-API-KEY"
        style="flex: 1; min-width: 200px"
      ></html:input>
    </hbox>
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">API URL:</label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-firecrawlApiUrl"
        placeholder="https://api.firecrawl.dev/v2 or http://localhost:3002/v2"
        style="flex: 1; min-width: 200px"
      >
      </html:input>
    </hbox>
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">Search Limit:</label>
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-firecrawlSearchLimit"
        placeholder="3"
        min="1"
        max="10"
        style="width: 60px"
      ></html:input>
      <label style="margin-left: 8px; font-size: 11px; color: #666"
        >Results per query (1-10)</label
      >
    </hbox>
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">Max Concurrent:</label>
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-firecrawlMaxConcurrent"
        placeholder="3"
        min="1"
        max="10"
        style="width: 60px"
      ></html:input>
      <label style="margin-left: 8px; font-size: 11px; color: #666"
        >Parallel requests (1-10)</label
      >
    </hbox>
    <hbox align="center" style="gap: 16px">
      <html:a
        href="https://firecrawl.dev"
        style="
          color: #0066cc;
          text-decoration: underline;
          cursor: pointer;
          font-size: 12px;
        "
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
      >
        🔥 Get Firecrawl API Key
      </html:a>
      <html:a
        href="https://github.com/mendableai/firecrawl"
        style="
          color: #0066cc;
          text-decoration: underline;
          cursor: pointer;
          font-size: 12px;
        "
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
      >
        🖥️ Setup Firecrawl Locally
      </html:a>
    </hbox>
  </vbox>

  <!-- Tavily Settings -->
  <vbox
    id="zotero-prefpane-__addonRef__-tavilySettings"
    style="
      margin-left: 20px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    "
  >
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">API Key:</label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-tavilyApiKey"
        placeholder="tvly-YOUR-API-KEY"
        style="flex: 1; min-width: 200px"
      ></html:input>
    </hbox>
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">Search Depth:</label>
      <menulist
        id="zotero-prefpane-__addonRef__-tavilySearchDepth"
        style="min-width: 120px"
      >
        <menupopup>
          <menuitem value="basic" label="Basic (faster)" />
          <menuitem value="advanced" label="Advanced (deeper)" />
        </menupopup>
      </menulist>
    </hbox>
    <hbox align="center" style="margin-bottom: 8px">
      <label style="width: 100px">Search Limit:</label>
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-tavilySearchLimit"
        placeholder="5"
        min="1"
        max="20"
        style="width: 60px"
      ></html:input>
      <label style="margin-left: 8px; font-size: 11px; color: #666"
        >Results per query (1-20)</label
      >
    </hbox>
    <hbox align="center" style="gap: 16px">
      <html:a
        href="https://app.tavily.com"
        style="
          color: #0066cc;
          text-decoration: underline;
          cursor: pointer;
          font-size: 12px;
        "
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
      >
        🔍 Get Tavily API Key
      </html:a>
      <html:a
        href="https://docs.tavily.com"
        style="
          color: #0066cc;
          text-decoration: underline;
          cursor: pointer;
          font-size: 12px;
        "
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
      >
        📖 Tavily Documentation
      </html:a>
    </hbox>
  </vbox>
</groupbox>

<html:hr style="margin: 16px 0" />

<label>
  <html:h3>AI &amp; Table Settings</html:h3>
</label>
<vbox
  style="
    margin-left: 20px;
    padding: 10px;
    background: rgba(0, 0, 0, 0.03);
    border-radius: 4px;
  "
>
  <hbox align="center" style="margin-bottom: 8px">
    <label style="width: 150px">Max Concurrent AI:</label>
    <html:input
      type="number"
      id="zotero-prefpane-__addonRef__-aiMaxConcurrent"
      placeholder="5"
      min="1"
      max="20"
      style="width: 60px"
    ></html:input>
    <label style="margin-left: 8px; font-size: 11px; color: #666"
      >Parallel AI requests (1-20)</label
    >
  </hbox>
  <hbox align="center" style="margin-bottom: 8px">
    <checkbox
      id="zotero-prefpane-__addonRef__-tableGenerationSound"
      label="🔔 Sound notification on table generation complete"
      checked="true"
    />
  </hbox>
</vbox>

<html:hr style="margin: 16px 0" />

<label>
  <html:h3>Cloud Storage Integration</html:h3>
</label>
<vbox
  style="
    margin-left: 20px;
    padding: 10px;
    background: rgba(0, 0, 0, 0.03);
    border-radius: 4px;
  "
>
  <!-- Provider Selector -->
  <hbox align="center" style="margin-bottom: 12px">
    <label style="width: 100px; font-weight: bold">Provider:</label>
    <menulist id="seerai-cloud-provider-select" style="min-width: 200px">
      <menupopup>
        <menuitem value="nextcloud" label="Nextcloud" />
        <menuitem value="google" label="Google Drive" />
        <menuitem value="onedrive" label="OneDrive" />
        <menuitem value="dropbox" label="Dropbox" />
        <menuitem value="box" label="Box" />
      </menupopup>
    </menulist>
  </hbox>

  <!-- === Google Drive Settings === -->
  <vbox id="seerai-cloud-settings-google">
    <hbox align="center" style="margin-bottom: 8px">
      <html:span id="seerai-drive-status-icon" style="margin-right: 6px"
        >⚪</html:span
      >
      <html:span id="seerai-drive-status-text">Not connected</html:span>
    </hbox>
    <button id="seerai-drive-signin-btn" label="Sign In with Google Drive" />
    <hbox
      id="seerai-drive-paste-area"
      align="center"
      style="margin-top: 8px; gap: 6px"
      hidden="true"
    >
      <html:input
        type="text"
        id="seerai-drive-paste-input"
        placeholder="Paste auth code or redirect URL"
        style="flex: 1"
      />
      <button id="seerai-drive-paste-verify" label="Verify" />
      <html:span
        id="seerai-drive-paste-status"
        style="font-size: 10px; color: var(--text-secondary); display: none"
      />
    </hbox>
    <html:a
      id="seerai-drive-custom-oauth-toggle"
      style="
        font-size: 11px;
        cursor: pointer;
        color: var(--text-secondary);
        margin-top: 12px;
        display: inline-block;
        text-decoration: underline;
      "
      >Set Custom OAuth credentials...</html:a
    >
    <vbox
      id="seerai-drive-custom-oauth"
      hidden="true"
      style="
        margin-top: 8px;
        padding: 10px;
        background: var(--background-secondary);
        border-radius: 4px;
      "
    >
      <hbox align="center" style="margin-bottom: 6px">
        <html:label style="width: 120px">Client ID:</html:label>
        <html:input
          type="text"
          id="seerai-drive-client-id"
          style="flex: 1"
          placeholder="Default: 22680022759-6e2lk...apps.googleusercontent.com"
        />
      </hbox>
      <hbox align="center" style="margin-bottom: 10px">
        <html:label style="width: 120px">Client Secret:</html:label>
        <html:input
          type="password"
          id="seerai-drive-client-secret"
          style="flex: 1"
          placeholder="(Required - if empty default used)"
        />
      </hbox>
      <button id="seerai-drive-save-btn" label="Save" disabled="true" />
    </vbox>
    <html:p
      style="
        font-size: 10px;
        color: var(--text-tertiary);
        margin-top: 8px;
        line-height: 1.4;
      "
    >
      Redirect URI:
      <html:code>http://localhost:23119/seerai/google/callback</html:code>
      <br />Need credentials?
      <html:a
        href="https://console.cloud.google.com/apis/credentials"
        style="color: #0066cc; text-decoration: underline; cursor: pointer"
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
        >Google Cloud Console</html:a
      >
    </html:p>
    <button
      id="seerai-drive-clear-btn"
      label="Disconnect &amp; Clear"
      style="margin-top: 12px"
    />
  </vbox>

  <!-- === Dropbox Settings === -->
  <vbox id="seerai-cloud-settings-dropbox" hidden="true">
    <hbox align="center" style="margin-bottom: 8px">
      <html:span id="seerai-dropbox-status-icon" style="margin-right: 6px"
        >⚪</html:span
      >
      <html:span id="seerai-dropbox-status-text">Not connected</html:span>
    </hbox>
    <button id="seerai-dropbox-signin-btn" label="Sign In with Dropbox" />
    <hbox
      id="seerai-dropbox-paste-area"
      align="center"
      style="margin-top: 8px; gap: 6px"
      hidden="true"
    >
      <html:input
        type="text"
        id="seerai-dropbox-paste-input"
        placeholder="Paste auth code or redirect URL"
        style="flex: 1"
      />
      <button id="seerai-dropbox-paste-verify" label="Verify" />
      <html:span
        id="seerai-dropbox-paste-status"
        style="font-size: 10px; color: var(--text-secondary); display: none"
      />
    </hbox>
    <html:a
      id="seerai-dropbox-custom-oauth-toggle"
      style="
        font-size: 11px;
        cursor: pointer;
        color: var(--text-secondary);
        margin-top: 12px;
        display: inline-block;
        text-decoration: underline;
      "
      >Set Custom App Key...</html:a
    >
    <vbox
      id="seerai-dropbox-custom-oauth"
      hidden="true"
      style="
        margin-top: 8px;
        padding: 10px;
        background: var(--background-secondary);
        border-radius: 4px;
      "
    >
      <hbox align="center" style="margin-bottom: 6px">
        <html:label style="width: 120px">App Key:</html:label>
        <html:input
          type="text"
          id="seerai-dropbox-client-id"
          style="flex: 1"
          placeholder="Default: i91subs0zer8bi1"
        />
      </hbox>
      <button id="seerai-dropbox-save-btn" label="Save" disabled="true" />
    </vbox>
    <html:p
      style="
        font-size: 10px;
        color: var(--text-tertiary);
        margin-top: 8px;
        line-height: 1.4;
      "
    >
      Redirect URI:
      <html:code>http://localhost:23119/seerai/dropbox/callback</html:code>
      <br />Permissions: In the Dropbox App Console, check ALL checkboxes under
      <b>Files and folders</b> (read/write). <br />Need an app?
      <html:a
        href="https://www.dropbox.com/developers/apps"
        style="color: #0066cc; text-decoration: underline; cursor: pointer"
        onclick="
          Zotero.launchURL(this.href);
          return false;
        "
        >Dropbox App Console</html:a
      >
    </html:p>
    <button
      id="seerai-dropbox-clear-btn"
      label="Disconnect &amp; Clear"
      style="margin-top: 12px"
    />
  </vbox>

  <!-- === Box Settings === -->
  <vbox id="seerai-cloud-settings-box" hidden="true">
    <hbox align="center" style="margin-bottom: 8px">
      <html:span id="seerai-box-status-icon" style="margin-right: 6px"
        >⚪</html:span
      >
      <html:span id="seerai-box-status-text">Not connected</html:span>
    </hbox>
    <button id="seerai-box-signin-btn" label="Sign In with Box" />
    <hbox
      id="seerai-box-paste-area"
      align="center"
      style="margin-top: 8px; gap: 6px"
      hidden="true"
    >
      <html:input
        type="text"
        id="seerai-box-paste-input"
        placeholder="Paste auth code or redirect URL"
        style="flex: 1"
      />
      <button id="seerai-box-paste-verify" label="Verify" />
      <html:span
        id="seerai-box-paste-status"
        style="font-size: 10px; color: var(--text-secondary); display: none"
      />
    </hbox>
    <html:a
      id="seerai-box-custom-oauth-toggle"
      style="
        font-size: 11px;
        cursor: pointer;
        color: var(--text-secondary);
        margin-top: 12px;
        display: inline-block;
        text-decoration: underline;
      "
      >Set Custom OAuth credentials...</html:a
